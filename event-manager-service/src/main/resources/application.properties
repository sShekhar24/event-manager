# Server Configuration
server.port=${SERVER_PORT:8003}
spring.application.name=event-manager-service

# Database Configuration (Using Render Environment Variables)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&enabledTLSProtocols=TLSv1.2,TLSv1.3&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
#cors.allowed-origins=http://localhost:3000,http://localhost:5173
#cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
#cors.allowed-headers=*
#cors.allow-credentials=true

#CORS updated for render
# CORS Configuration (Updated for Production)
# NOTE: Replace the first URL with your actual Render Frontend URL once deployed
cors.allowed-origins=https://event-manager-frontend.onrender.com,http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging Configuration
logging.level.root=debug
#logging.level.root=info
logging.level.com.shaan.event.manager=debug
logging.file.name=logs/application.log
app.version=1.0.0

# Static Resource Configuration
spring.web.resources.static-locations=classpath:/static/

spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=false
